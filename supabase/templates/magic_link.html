<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
</head>
<body style="font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #1f2937; line-height: 1.6; margin: 0; padding: 32px 12px; background: #f1f4f9;">
  <div style="max-width: 600px; width: 100%; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden;">
    <div style="padding: 20px 28px 18px; border-bottom: 1px solid #e5e7eb;">
      <p style="margin: 0; font-weight: 500; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: #1f2937; line-height: 1;">
        <span style="display: inline-block; width: 8px; height: 8px; border-radius: 2px; background-color: #1f2937; margin-right: 10px; vertical-align: middle;"></span>
        <span style="vertical-align: middle;">lende</span>
      </p>
      <p style="margin: 14px 0 0; font-size: 12px; line-height: 1.5; color: #6b7280; font-style: italic;">
        Your lende verification code
      </p>
    </div>
    <div style="padding: 28px; text-align: center;">
      <p style="margin: 0 0 4px; font-weight: 400; font-size: 20px; line-height: 1.35; color: #1f2937;">
        Your verification code
      </p>
      <p style="margin: 18px 0 0; font-size: 15px; line-height: 1.6; color: #6b7280;">
        Enter this code in your browser to continue.
      </p>
      <div style="margin: 22px auto; padding: 18px 20px; background: #f1f4f9; border: 1px solid #e5e7eb; border-radius: 8px; font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 32px; font-weight: 500; letter-spacing: 0.4em; color: #1f2937;">
        {{ .Token }}
      </div>
      <p style="margin: 18px 0 0; font-size: 13px; line-height: 1.6; color: #6b7280;">
        This code expires in 5 minutes.
      </p>
      <p style="margin: 6px 0 0; font-size: 13px; line-height: 1.6; color: #6b7280;">
        If you didn't request this, you can safely ignore this email.
      </p>
    </div>
    <div style="padding: 24px 28px 28px; border-top: 1px solid #e5e7eb;">
      <p style="margin: 0; font-weight: 500; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #1f2937; line-height: 1;">
        <span style="display: inline-block; width: 7px; height: 7px; border-radius: 2px; background-color: #1f2937; margin-right: 10px; vertical-align: middle;"></span>
        <span style="vertical-align: middle;">lende</span>
      </p>
      <p style="margin: 14px 0 0; font-size: 11px; line-height: 1.55; color: #6b7280;">
        ShipByX Ltd · Auckland, NZ
      </p>
    </div>
  </div>
</body>
</html>
